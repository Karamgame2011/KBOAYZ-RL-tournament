<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>Rocket League Family Tournament</header>
<nav>
  <a href="index.html" class="nav-link">Home</a>
  <a href="leaderboard.html" class="nav-link">Leaderboard</a>
  <a href="schedule.html" class="nav-link">Schedule</a>
  <a href="prediction.html" class="nav-link">Predictions</a>
</nav>
<script>
  // Highlight current page in navbar
  const links = document.querySelectorAll('nav a.nav-link');
  const current = location.pathname.split("/").pop(); // gets current filename
  links.forEach(link => {
    if(link.getAttribute('href') === current){
      link.classList.add('active');
    }
  });
</script>
<section>
  <h2>Leaderboard</h2>
  <table id="scoreTable">
    <tr><th>Player</th><th>Points</th><th>Status</th></tr>
    <tr><td>Karam</td><td>0</td><td></td></tr>
    <tr><td>Abood</td><td>0</td><td></td></tr>
    <tr><td>Belal</td><td>0</td><td></td></tr>
    <tr><td>Omar</td><td>0</td><td></td></tr>
    <tr><td>Zaid</td><td>50</td><td></td></tr>
    <tr><td>Joud</td><td>30</td><td></td></tr>
  </table>
  <div style="text-align:center; margin-top:10px;">
    <button onclick="editPoints()">Edit Points</button>
    <button onclick="useTicket()">Use Power Ticket</button>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
