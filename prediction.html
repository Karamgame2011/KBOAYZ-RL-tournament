<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RL Prediction Leaderboard</title>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #0a0a1f;
    color: white;
    text-align: center;
    padding: 20px;
  }

  header {
    background: linear-gradient(90deg, #000022, #a0e0ff);
    background-size: 300% 100%;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    animation: gradientSlide 10s ease-in-out infinite alternate;
    margin-bottom: 20px;
  }

  @keyframes gradientSlide {
    0% { background-position: 0% 0; }
    100% { background-position: 50% 0; }
  }

  input, button {
    padding: 10px;
    margin: 5px;
    font-size: 16px;
  }

  ul {
    list-style: none;
    padding: 0;
  }

  li {
    font-size: 20px;
    margin: 5px 0;
  }
</style>
</head>
<body>

<header>Rocket League Prediction Leaderboard</header>

<h2>Log In</h2>
<input type="text" id="username" placeholder="Enter your username">
<button onclick="createOrLogin()">Log In</button>

<h2>Leaderboard</h2>
<ul id="leaderboard"></ul>

<script>
  // 🔹 Your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyDNuj0bwWC8Zvk_UsjmOktHf1MTXo8OFP4",
    authDomain: "rl-tournament-kboayz.firebaseapp.com",
    projectId: "rl-tournament-kboayz",
    storageBucket: "rl-tournament-kboayz.firebasestorage.app",
    messagingSenderId: "836913120932",
    appId: "1:836913120932:web:c6994acf39bf71d6354831",
    measurementId: "G-VR167KSXEB"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let currentUser = null;

  // Create or login user
  function createOrLogin() {
    const username = document.getElementById("username").value.trim();
    if (!username) return alert("Enter a username!");
    currentUser = username;

    db.collection("predictions").doc(username).set({ name: username, points: 0 }, { merge: true })
      .then(() => {
        alert("Logged in as " + username);
      });
  }

  // Add a point to current user
  function addPoint(username) {
    const userRef = db.collection("predictions").doc(username);
    userRef.update({ points: firebase.firestore.FieldValue.increment(1) });
  }

  // Real-time leaderboard
  const leaderboardList = document.getElementById("leaderboard");
  db.collection("predictions").orderBy("points", "desc")
    .onSnapshot(snapshot => {
      leaderboardList.innerHTML = "";
      snapshot.forEach(doc => {
        const data = doc.data();
        leaderboardList.innerHTML += `<li>${data.name}: ${data.points} pts</li>`;
      });
    });

</script>
</body>
</html>
