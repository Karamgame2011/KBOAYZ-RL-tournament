<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction Leaderboard</title>
<style>
body { font-family: Arial, sans-serif; background-color: #0a0a1f; color: white; text-align: center; padding: 20px; }
header { background: linear-gradient(90deg, #000022, #a0e0ff); background-size: 300% 100%; padding: 20px; font-size: 28px; font-weight: bold; animation: gradientSlide 10s ease-in-out infinite alternate; margin-bottom: 10px; }
@keyframes gradientSlide { 0% { background-position: 0% 0; } 100% { background-position: 50% 0; } }
nav a { color: white; text-decoration: none; margin: 0 10px; font-size: 18px; }
nav a.active { color: #a0e0ff; font-weight: bold; }
input, button { padding: 8px; margin: 5px; font-size: 16px; }
table { margin: 20px auto; border-collapse: collapse; width: 80%; }
th, td { border: 1px solid white; padding: 8px; text-align: center; }
th { background-color: #222266; }
</style>
</head>
<body>

<header>Rocket League Family Tournament</header>

<nav>
  <a href="index.html" class="nav-link">Home</a>
  <a href="leaderboard.html" class="nav-link">Leaderboard</a>
  <a href="schedule.html" class="nav-link">Schedule</a>
  <a href="prediction.html" class="nav-link">Predictions</a>
</nav>

<section id="loginSection">
  <h2>Login / Register</h2>
  <input type="text" id="predUsername" placeholder="Username">
  <input type="password" id="predPassword" placeholder="Password">
  <button id="loginBtn">Log In / Register</button>
  <p id="loginMsg"></p>
</section>

<section id="predictionPanel" style="display:none;">
  <h2>Predict Next MVP</h2>
  <input type="text" id="mvpPrediction" placeholder="Player Name">
  <button id="submitPredictionBtn">Submit Prediction</button>
</section>

<section>
  <h2>User Points</h2>
  <table id="predictionTable">
    <tr><th>Username</th><th>Prediction Points</th></tr>
  </table>
</section>

<script>
// ---------- User system ----------
if(!localStorage.getItem("predUsers")) localStorage.setItem("predUsers", JSON.stringify({}));
let currentUser = null;

// Login or register
function registerLogin() {
  const username = document.getElementById("predUsername").value.trim();
  const password = document.getElementById("predPassword").value.trim();
  if(username===""||password==="") return alert("Enter username and password");

  let users = JSON.parse(localStorage.getItem("predUsers"));
  if(users[username]){
    // Login
    if(users[username].password !== password) return alert("Wrong password");
    currentUser = username;
    document.getElementById("loginMsg").innerText = `Logged in as ${username}`;
  } else {
    // Register
    users[username] = {password: password, points:0, predictions:{}};
    localStorage.setItem("predUsers", JSON.stringify(users));
    currentUser = username;
    document.getElementById("loginMsg").innerText = `Registered and logged in as ${username}`;
  }

  document.getElementById("predictionPanel").style.display="block";
  updatePredictionTable();
}

// Submit prediction
function submitPrediction() {
  if(!currentUser) return alert("Log in first!");
  const prediction = document.getElementById("mvpPrediction").value.trim();
  if(!prediction) return alert("Enter a player name");

  let users = JSON.parse(localStorage.getItem("predUsers"));

  // Example correct MVP
  const correctMVP = "Zaid";
  if(prediction.toLowerCase() === correctMVP.toLowerCase()){
    users[currentUser].points += 1;
    alert("Correct! Point added.");
  } else {
    alert("Prediction submitted! (Incorrect)");
  }

  localStorage.setItem("predUsers", JSON.stringify(users));
  document.getElementById("mvpPrediction").value="";
  updatePredictionTable();
}

// Update leaderboard
function updatePredictionTable() {
  let users = JSON.parse(localStorage.getItem("predUsers"));
  const table = document.getElementById("predictionTable");
  table.innerHTML = '<tr><th>Username</th><th>Prediction Points</th></tr>';

  Object.keys(users).sort((a,b)=>users[b].points-users[a].points).forEach(u=>{
    const row = table.insertRow();
    row.insertCell(0).innerText = u;
    row.insertCell(1).innerText = users[u].points;
  });
}

// Attach button listeners
document.getElementById("loginBtn").addEventListener("click", registerLogin);
document.getElementById("submitPredictionBtn").addEventListener("click", submitPrediction);
</script>

</body>
</html>
