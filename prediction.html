<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rocket League Prediction Leaderboard</title>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getFirestore, collection, doc, setDoc, updateDoc, increment, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

  // 🔹 Your Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyDNuj0bwWC8Zvk_UsjmOktHf1MTXo8OFP4",
    authDomain: "rl-tournament-kboayz.firebaseapp.com",
    projectId: "rl-tournament-kboayz",
    storageBucket: "rl-tournament-kboayz.firebasestorage.app",
    messagingSenderId: "836913120932",
    appId: "1:836913120932:web:c6994acf39bf71d6354831",
    measurementId: "G-VR167KSXEB"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 🔹 Current logged-in user
  let currentUser = null;

  // Create or login user
  window.createOrLogin = async function() {
    const username = document.getElementById("username").value.trim();
    if (!username) return alert("Enter a username!");
    currentUser = username;

    const userRef = doc(db, "predictions", username);
    await setDoc(userRef, { name: username, points: 0 }, { merge: true });
  };

  // Add a point when the prediction is correct
  window.addPoint = async function(username) {
    const userRef = doc(db, "predictions", username);
    await updateDoc(userRef, { points: increment(1) });
  };

  // Real-time leaderboard
  window.onload = () => {
    const q = query(collection(db, "predictions"), orderBy("points", "desc"));
    onSnapshot(q, (snapshot) => {
      const list = document.getElementById("leaderboard");
      list.innerHTML = "";
      snapshot.forEach(doc => {
        const data = doc.data();
        list.innerHTML += `<li>${data.name}: ${data.points} pts</li>`;
      });
    });
  };
</script>

<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #0a0a1f;
    color: white;
    text-align: center;
    padding: 20px;
  }

  header {
    background: linear-gradient(90deg, #000022, #a0e0ff);
    background-size: 300% 100%;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
    animation: gradientSlide 10s ease-in-out infinite alternate;
    margin-bottom: 20px;
  }

  @keyframes gradientSlide {
    0% { background-position: 0% 0; }
    100% { background-position: 50% 0; }
  }

  input, button {
    padding: 10px;
    margin: 5px;
    font-size: 16px;
  }

  ul {
    list-style: none;
    padding: 0;
  }

  li {
    font-size: 20px;
    margin: 5px 0;
  }
</style>
</head>
<body>

<header>Rocket League Prediction Leaderboard</header>

<h2>Log In</h2>
<input type="text" id="username" placeholder="Enter your username">
<button onclick="createOrLogin()">Log In</button>

<h2>Leaderboard</h2>
<ul id="leaderboard"></ul>

<!-- Example button to test adding a point -->
<!-- In your real system, call addPoint(currentUser) when prediction is correct -->
<!-- <button onclick="addPoint(currentUser)">Add Point (test)</button> -->

</body>
</html>
